name: Release OpenMRS Module on Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    env:
      MODULE_VERSION: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Pass 1: generate SQL files into api/src/main/resources/mamba/
      - name: Pass 1 — generate SQL files
        run: mvn install -DskipTests

      # Pass 2: clean rebuild so the api jar (and therefore the OMOD) includes the SQL
      - name: Pass 2 — build OMOD with generated SQL
        run: mvn clean install -DskipTests

      - name: Get module version from POM
        id: get_version
        run: echo "MODULE_VERSION=$(mvn help:evaluate -q -Dexpression=project.version -P!standard-release-profile)" >> $GITHUB_ENV

      - name: Create GitHub Release and upload OMOD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${{ github.ref }}
          TAG_NAME=${TAG_NAME#refs/tags/}
          OMOD_PATH=$(find omod/target -name "*.omod" -print -quit)
          gh release create "$TAG_NAME" "$OMOD_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release ${{ env.MODULE_VERSION }}" \
            --generate-notes
