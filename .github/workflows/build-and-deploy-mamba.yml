name: Compile & Deploy Mamba

on:
  push:
    branches: ["disable"]
  pull_request:
    branches: ["disable"]

jobs:
  build_and_deploy:
    runs-on: ethiohri-dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      # Pass 1: run ETL compiler so it deposits *.sql into api/src/main/resources/mamba/
      - name: Pass 1 — generate SQL files
        run: mvn install -DskipTests

      # Pass 2: clean rebuild — api jar now picks up the generated SQL, OMOD includes them
      - name: Pass 2 — build OMOD with generated SQL
        run: mvn clean install -DskipTests

      - name: Verify SQL scripts are inside the api jar
        run: |
          API_JAR=$(find api/target -name "*api-*.jar" | head -n 1)
          if [ -z "$API_JAR" ]; then
            echo "Error: API JAR not found in api/target."
            exit 1
          fi
          echo "API JAR: $API_JAR"
          if jar tf "$API_JAR" | grep -q "mamba/jdbc_create_stored_procedures.sql"; then
            echo "OK: jdbc_create_stored_procedures.sql present in api jar."
          else
            echo "Error: jdbc_create_stored_procedures.sql missing from api jar."
            jar tf "$API_JAR" | grep mamba || echo "(no mamba entries)"
            exit 1
          fi

      - name: Find .omod file
        id: find_omod
        run: |
          OMOD_PATH=$(find "${{ github.workspace }}" -name "*.omod" | head -n 1)
          if [ -z "$OMOD_PATH" ]; then
            echo "Error: No .omod file found."
            exit 1
          fi
          echo "Found .omod at: $OMOD_PATH"
          echo "omod_file_path=$OMOD_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy OMOD to Tomcat modules directory
        run: |
          TARGET_MODULES_DIR="/usr/share/tomcat/tomcat8/.OpenMRS/modules/"
          OMOD_FILE_SOURCE="${{ steps.find_omod.outputs.omod_file_path }}"
          sudo cp "$OMOD_FILE_SOURCE" "$TARGET_MODULES_DIR"
          echo "Copied $(basename "$OMOD_FILE_SOURCE") to $TARGET_MODULES_DIR"
          sudo chown -R tomcat8:tomcat8 "$TARGET_MODULES_DIR"
          sudo find "$TARGET_MODULES_DIR" -type d -exec chmod 755 {} +
          sudo find "$TARGET_MODULES_DIR" -type f -exec chmod 644 {} +

      - name: Restart Tomcat
        run: |
          sudo systemctl restart tomcat8
          sleep 10
          sudo systemctl is-active tomcat8 && echo "Tomcat is active." || echo "Tomcat is not active."

      - name: Upload OMOD as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmrs-module-${{ github.run_id }}
          path: ${{ steps.find_omod.outputs.omod_file_path }}
          retention-days: 7
